<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 175" width="380" height="175">
  <style>
    .card {
      fill: #ffffff;
      stroke: #e2e8f0;
      stroke-width: 1.5px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card:hover {
      stroke: #1f883d;
      filter: drop-shadow(0 6px 12px rgba(31, 136, 61, 0.12));
    }
    .title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 20px;
      font-weight: 700;
      fill: #0f172a;
    }
    .desc {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      fill: #64748b;
    }
    .button-group {
      cursor: pointer;
    }
    .button {
      fill: #1f883d;
      transition: fill 0.2s ease-in-out;
    }
    .button-group:hover .button {
      fill: #1a7f37;
    }
    .button-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      font-weight: 600;
      fill: #ffffff;
    }
    .icon {
      fill: #0f172a;
    }
    .badge-bg {
      fill: #dafbe1;
    }
    .badge-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 11px;
      font-weight: 700;
      fill: #1f883d;
    }
    
    @media (prefers-color-scheme: dark) {
      .card {
        fill: #0d0b18;
        stroke: #1f1b2e;
      }
      .card:hover {
        stroke: #2ea043;
        filter: drop-shadow(0 6px 12px rgba(46, 160, 67, 0.2));
      }
      .title {
        fill: #f3f4f6;
      }
      .desc {
        fill: #9ca3af;
      }
      .icon {
        fill: #f3f4f6;
      }
      .badge-bg {
        fill: rgba(35, 134, 54, 0.2);
      }
      .badge-text {
        fill: #56d364;
      }
      .button {
        fill: #238636;
      }
      .button-group:hover .button {
        fill: #2ea043;
      }
    }
  </style>

  <rect x="0.75" y="0.75" width="378.5" height="173.5" rx="12" class="card" />

  <!-- OS Title, Icon, and Pre-Release Badge -->
  <g>
    <!-- Windows Icon -->
    <g transform="translate(24, 22)" class="icon">
      <svg role="img" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
        <path d="M0,0H11.377V11.372H0ZM12.623,0H24V11.372H12.623ZM0,12.623H11.377V24H0Zm12.623,0H24V24H12.623" />
      </svg>
    </g>
    <text x="60" y="41" class="title">Windows</text>
    
    <!-- Pre-Release Badge -->
    <g>
      <rect x="160" y="23" width="80" height="20" rx="10" class="badge-bg" />
      <text x="200" y="37" class="badge-text" text-anchor="middle">Pre-Release</text>
    </g>
  </g>

  <!-- Button Link -->
  <g class="button-group" transform="translate(24, 68)">
    <rect width="210" height="38" rx="8" class="button" />
    <!-- Download Icon -->
    <path d="M12 3v10m0 0l-3-3m3 3l3-3M5 17h14" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" transform="translate(12, 7) scale(0.9)" />
    <text x="38" y="24" class="button-text">Download .exe / .msi</text>
  </g>

  <!-- Subtext Description -->
  <text x="24" y="138" class="desc">Official installers and portable binaries for Windows 10/11 x64</text>
</svg>
